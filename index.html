<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Mondial Interactif - Recherche Globale</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo-container">
                <span class="logo-text">🌍 ATLAS MONDIAL</span>
            </div>
        </nav>
    </header>

    <main>
        <!-- Section Formulaire de Saisie -->
        <section class="search-section">
            <h2>Explorez les Nations du Monde</h2>
            <p class="section-subtitle">Saisissez le nom d'un pays pour générer sa carte d'identité sémantique et dynamique.</p>
            
            <form id="searchForm" novalidate>
                <div class="input-group">
                    <label for="countryInput" class="visually-hidden">Nom du pays :</label>
                    <input 
                        type="text" 
                        id="countryInput" 
                        placeholder="Ex: Haiti, Canada, France, Japan..." 
                        autocomplete="off"
                    >
                    <button type="submit" id="submitBtn">Rechercher</button>
                </div>
                <p id="errorFeedback" class="error-message" role="alert"></p>
            </form>
        </section>

        <!-- Indicateur de Chargement Réseau (Spinner) -->
        <div id="loader" class="loader-container" aria-live="polite" aria-hidden="true">
            <div class="spinner"></div>
            <p>Chargement des données mondiales...</p>
        </div>

        <!-- Section de Rendu des Données -->
        <section id="resultSection" class="result-section" aria-live="informative">
            <!-- Rendu dynamique sans faille XSS -->
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Atlas Mondial Interactif - Projet Académique TIC400.</p>
        </div>
    </footer>

    <!-- CORRECTION DE LA CASSE DE LIAISON (MINUSCULES STRICTES) -->
    <script src="js/app.js"></script>
</body>
</html>
