<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Mondial Interactif - Recherche Globale</title>
    <!-- Chargement de la feuille de style responsive requise par le barème -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Structure HTML5 Sémantique : En-tête et Navigation -->
    <header>
        <nav class="navbar">
            <div class="logo-container">
                <span class="logo-text">🌍 ATLAS MONDIAL</span>
            </div>
        </nav>
    </header>

    <!-- Zone principale d'architecture sémantique -->
    <main>
        
        <!-- Section 1 : Formulaire d'action et de saisie utilisateur -->
        <section class="search-section">
            <h2>Explorez les Nations du Monde</h2>
            <p class="section-subtitle">Saisissez le nom d'un pays pour générer sa carte d'identité sémantique, visuelle et dynamique.</p>
            
            <form id="searchForm" novalidate>
                <div class="input-group">
                    <label for="countryInput" class="visually-hidden">Nom du pays :</label>
                    <input 
                        type="text" 
                        id="countryInput" 
                        placeholder="Ex: Haiti, Canada, France, Japan..." 
                        autocomplete="off"
                    >
                    <button type="submit" id="submitBtn">Rechercher</button>
                </div>
                <!-- Zone de feedback d'erreur connectée structurellement via ARIA -->
                <p id="errorFeedback" class="error-message" role="alert"></p>
            </form>
        </section>

        <!-- Section 2 : Indicateur de Chargement Réseau (Spinner d'attente animé) -->
        <div id="loader" class="loader-container" aria-live="polite" aria-hidden="true">
            <div class="spinner"></div>
            <p>Chargement des données mondiales...</p>
        </div>

        <!-- Section 3 : Zone de rendu et d'injection des données du JSON -->
        <section id="resultSection" class="result-section" aria-live="informative">
            <!-- Le contenu de la carte d'identité sera injecté dynamiquement par js/app.js -->
        </section>

    </main>

    <!-- Structure HTML5 Sémantique : Pied de page -->
    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Atlas Mondial Interactif - Projet Académique TIC400.</p>
        </div>
    </footer>

    <!-- Liaison finale du script en minuscules strictes (Conformité de casse pour GitHub Pages) -->
    <script src="js/app.js"></script>
</body>
</html>
